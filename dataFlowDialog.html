<!doctype html><html><head><meta charset="UTF-8"/><meta http-equiv="X-UA-Compatible" content="IE=Edge"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Data Flow</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><style>:root{--bg:#f3f3f3;--panel:#fff;--header:#d9d9d9;--line:#a8a8a8;--muted:#777;--self:#7f7f7f;--selected:#0078d4;--hover:#e8f4ff;--crosshair:#dff0ff;--active:#c6e7ff}body,html{height:100%;margin:0;font-family:"Segoe UI",Arial,sans-serif;color:#111;background:var(--bg)}.shell{height:100%;display:flex;flex-direction:column;box-sizing:border-box;padding:10px;gap:8px}.titlebar{display:flex;justify-content:space-between;align-items:center;min-height:28px;font-size:13px}#title{font-size:16px}button{min-height:26px;font:inherit;font-size:12px;border:1px solid #aaa;background:#fff;border-radius:2px;padding:2px 8px}.help{font-size:13px;line-height:1.25}.matrix-wrap{flex:1;min-height:0;overflow:auto;background:var(--panel);border:1px solid #ddd}table{border-collapse:collapse;font-size:11px}td,th{width:22px;min-width:22px;height:22px;box-sizing:border-box;border:1px solid var(--line);padding:0;text-align:center;vertical-align:middle;font-variant-numeric:tabular-nums}th{background:var(--header);font-weight:400}thead th{position:sticky;top:0;z-index:3;height:154px;vertical-align:bottom}thead th:first-child{left:0;z-index:4;min-width:216px;width:216px}.column-sheet span{writing-mode:vertical-rl;transform:rotate(180deg);display:inline-block;max-height:148px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:4px 0}.row-sheet{position:sticky;left:0;z-index:2;width:216px;min-width:216px;max-width:216px;padding:0 6px;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.self{background:var(--self)}.link{cursor:pointer;background:#fff;color:#000}.self.link{background:var(--self);color:#fff;font-weight:600}.link:hover{background:var(--hover)}.hover-col,.hover-row{background:var(--crosshair)}.active-col,.active-row{background:var(--active)}.self.active-col,.self.active-row,.self.hover-col,.self.hover-row,.self.link.active-col,.self.link.active-row,.self.link.hover-col,.self.link.hover-row{background:var(--self)}.column-sheet.active-col,.column-sheet.hover-col,.row-sheet.active-row,.row-sheet.hover-row{background:#b9dcff;color:#000}.link.selected{background:var(--selected);color:#fff;outline:1px solid #004f8c;outline-offset:-2px}.self.selected{background:var(--self);color:#fff;outline:2px solid var(--selected);outline-offset:-2px}.column-sheet[title$="(hidden)"],.row-sheet[title$="(hidden)"]{color:var(--muted)}footer{display:flex;justify-content:space-between;gap:12px;align-items:center;min-height:24px;font-size:12px;color:var(--muted)}a{color:#06c}</style><script defer="defer" src="dataFlowDialog.js"></script></head><body><div class="shell"><header class="titlebar"><div id="title">Data Flow</div><button id="closeBtn" type="button">Close</button></header><section class="help"><div>Data flow: from sheets in left column to sheets in top row.</div><div>Click a number to select linked formula cells.</div></section><main id="matrix" class="matrix-wrap"><table><thead id="matrixHead"></thead><tbody id="matrixBody"></tbody></table></main><footer><a id="exportLink" href="#">Export to new sheet</a> <span id="status">Loading...</span></footer></div></body></html>
