<!doctype html><html><head><meta charset="UTF-8"/><meta http-equiv="X-UA-Compatible" content="IE=Edge"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Formula Explorer</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><style>:root{--bg:#f3f3f3;--panel:#fff;--line:#d8d8d8;--line-soft:#e9e9e9;--text:#1f1f1f;--muted:#5f5f5f;--header:#f8f8f8;--hover:#eef5ff;--selected:#d9eaf7;--selected-border:#2b7cd3;--mark:#b0e0e6;--mark-line:#43858c}body,html{height:100%;margin:0;font-family:"Segoe UI",Arial,sans-serif;color:var(--text);background:var(--bg)}.dialog-shell{height:100%;display:flex;flex-direction:column;box-sizing:border-box;padding:8px;gap:6px}.titlebar,footer{display:flex;align-items:center;justify-content:space-between;gap:8px}.titlebar{min-height:32px;box-sizing:border-box;background:var(--panel);border:1px solid var(--line);padding:4px 6px 4px 10px;font-size:13px;font-weight:600}#title{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}button,select{min-height:26px;font:inherit;font-size:12px;border:1px solid #b7b7b7;background:var(--panel);color:var(--text);padding:2px 9px;border-radius:2px}button:hover,select:hover{border-color:#8f8f8f;background:#f9f9f9}.tree-wrap{flex:1;min-height:0;overflow:auto;background:var(--panel);border:1px solid var(--line)}table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:12px}td,th{border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);padding:3px 6px;text-align:left;vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}td:last-child,th:last-child{border-right:0}th{position:sticky;top:0;z-index:1;background:var(--header);color:#333;font-size:11px;font-weight:600;box-shadow:inset 0 -1px 0 var(--line)}td:nth-child(2),th:nth-child(2){text-align:right;font-variant-numeric:tabular-nums}td:nth-child(3),th:nth-child(3){color:var(--muted);font-size:11px}tr{cursor:default;outline:0}tr:hover{background:var(--hover)}tr.selected{background:var(--selected);box-shadow:inset 3px 0 0 var(--selected-border)}tr:focus-visible{outline:2px solid var(--selected-border);outline-offset:-2px}.tree-cell{display:inline-flex;align-items:center;min-width:0;width:100%}.indent{flex:0 0 calc(var(--level,0) * 16px);align-self:stretch;display:inline-flex;min-height:18px}.branch-guide{position:relative;flex:0 0 16px;width:16px;align-self:stretch}.branch-elbow::before,.branch-line::before{content:"";position:absolute;left:7px;top:-4px;bottom:-4px;border-left:1px solid #c7d0d9}.branch-elbow:not(.branch-through)::before{bottom:50%}.branch-elbow::after{content:"";position:absolute;left:7px;top:50%;width:9px;border-top:1px solid #c7d0d9}.node-label{min-width:0;overflow:hidden;text-overflow:ellipsis}.chevron{flex:0 0 14px;display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;margin-right:2px;color:#4f5f70;user-select:none}.chevron::before{content:"";width:0;height:0;border-top:4px solid transparent;border-bottom:4px solid transparent;border-left:5px solid currentColor;transform-origin:45% 50%}.chevron.expanded::before{transform:rotate(90deg)}.chevron.empty::before{display:none}.chevron.loading{color:var(--muted);font-size:10px;line-height:12px}.chevron.loading::before{display:none}.formula-preview{min-height:58px;max-height:96px;overflow:auto;box-sizing:border-box;background:var(--panel);border:1px solid var(--line);padding:7px 8px;font-family:Consolas,"Cascadia Code","Courier New",monospace;font-size:12px;line-height:1.45;white-space:pre-wrap;word-break:break-word}.formula-preview mark{background:var(--mark);border-bottom:1px solid var(--mark-line);padding:0}footer{min-height:28px;font-size:11px;color:var(--muted)}#status{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}</style><script defer="defer" src="formulaExplorerDialog.js"></script></head><body><div class="dialog-shell"><header class="titlebar"><div id="title">Formula Explorer</div><button id="closeBtn" type="button">Close</button></header><main class="tree-wrap"><table><colgroup><col style="width:54%"/><col style="width:20%"/><col style="width:26%"/></colgroup><thead><tr><th>Element</th><th>Value</th><th>Location</th></tr></thead><tbody id="treeBody" role="tree"></tbody></table></main><section id="preview" class="formula-preview"></section><footer><span id="status">Loading...</span> <select id="moreMenu" aria-label="More"><option value="">More</option><option value="expand">Expand all</option><option value="collapse">Collapse all</option><option value="copyFormula">Copy formula</option><option value="copyTree">Copy tree as text</option></select></footer></div></body></html>
